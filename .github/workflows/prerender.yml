name: Pre-render static HTML

# Runs automatically when schema.json or build.js changes.
# Also available on demand via the Actions tab → "Run workflow".
on:
  push:
    branches: [master]
    paths:
      - 'schema.json'
      - 'build.js'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run build.js
        run: node build.js

      - name: Commit pre-rendered HTML
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html \
                  cca-foundations-exam/index.html \
                  cca-practice-questions/index.html \
                  cca-exam-guide/index.html \
                  sitemap.xml
          git diff --staged --quiet \
            && echo "No changes to commit." \
            || git commit -m "chore: pre-render static HTML [skip ci]"
          git push
